<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Choose Us - CineWave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
            padding: 50px;
        }

        .why-choose-us {
            max-width: 1200px;
            margin: 0 auto;
            margin-top: 130px;
        }

        .why-choose-us h2 {
            font-size: 64px;
            color: #EC3343;
            text-align: center;
            margin-bottom: 20px;
        }

        .pricing-description {
            font-size: 18px;
            color: #FFFFFF;
            text-align: center;
            max-width: 600px;
            margin: 0 auto 64px;
            opacity: 0.8;
        }

        .features-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
        }

        .feature-card {
            flex: 1;
            min-width: 200px;
            text-align: center;
            position: relative;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
        }

        /* Пунктирная линия между иконками - вплотную */
        .feature-card:not(:last-child) .feature-icon::after {
            content: '';
            position: absolute;
            left: calc(100% + 5px);
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 2px;
            background: repeating-linear-gradient(to right, #EC3343, #EC3343 6px, transparent 6px, transparent 12px);
        }

        .feature-icon {
            margin-bottom: 25px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .feature-icon img {
            max-width: 80px;
            max-height: 80px;
            width: auto;
            height: auto;
            display: block;
            position: relative;
            z-index: 1;
            background-color: #0A0A0A;
        }

        .feature-title {
            font-size: 26px;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 16px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .feature-description {
            font-size: 18px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.5;
            margin-bottom: 27px;
            opacity: 0.8;
            min-height: 100px;
        }

        .feature-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: 500;
            color: #EC3343;
            text-decoration: none;
            transition: gap 0.3s ease;
            margin-top: auto;
            align-self: center;
        }

        .feature-link:hover {
            gap: 12px;
        }

        .feature-link svg {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 1024px) {
            .feature-card:not(:last-child) .feature-icon::after {
                width: 30px;
                left: calc(100% + 3px);
            }
        }

        @media (max-width: 768px) {
            .features-grid {
                flex-direction: column;
                gap: 40px;
            }

            .feature-card:not(:last-child) .feature-icon::after {
                display: none;
            }

            .why-choose-us h2 {
                font-size: 40px;
            }

            .feature-title {
                min-height: auto;
            }

            .feature-description {
                min-height: auto;
            }
        }
    </style>
</head>

<body>
    
</body>

</html>
